name: smit_billing
description: Мобильное приложение абонента СмИТ Биллинг
publish_to: 'none'
version: 1.3.0+16

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  # State management
  provider: ^6.1.2
  # HTTP & API
  http: ^1.2.1
  # Auth & Storage
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1
  local_auth: ^2.3.0
  # Push
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  # Payment & Links
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  # In-app review
  in_app_review: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
