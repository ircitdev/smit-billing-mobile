name: iOS App Store Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Remove alpha from icons
        run: |
          for f in ios/Runner/Assets.xcassets/AppIcon.appiconset/*.png; do
            sips -s format bmp "$f" --out /tmp/icon_tmp.bmp >/dev/null 2>&1
            sips -s format png /tmp/icon_tmp.bmp --out "$f" >/dev/null 2>&1
          done

      - name: Install Apple certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Setup App Store Connect API Key
        env:
          APP_STORE_API_KEY_P8: ${{ secrets.APP_STORE_API_KEY_P8 }}
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_API_KEY_P8" > ~/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8
          mkdir -p ~/.appstoreconnect/private_keys
          cp ~/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8 ~/.appstoreconnect/private_keys/
          mkdir -p ~/.private_keys
          cp ~/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8 ~/.private_keys/

      - name: Set signing in Xcode project
        run: |
          # Set manual signing only for Runner target
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = 6LX2W6558K/' ios/Runner.xcodeproj/project.pbxproj

          # Add provisioning profile to Release config
          /usr/libexec/PlistBuddy -c "Set :objects:97C146F01CF9000F007C117D:buildSettings:PROVISIONING_PROFILE_SPECIFIER 'SmIT Billing AppStore'" ios/Runner.xcodeproj/project.pbxproj 2>/dev/null || true

      - name: Build archive
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_API_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
        run: |
          cd ios
          pod install

          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8 \
            -authenticationKeyID ${APP_STORE_API_KEY_ID} \
            -authenticationKeyIssuerID ${APP_STORE_API_ISSUER_ID} \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            'RUNNER_CODE_SIGN_IDENTITY=Apple Distribution' \
            DEVELOPMENT_TEAM=6LX2W6558K \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export IPA
        env:
          APP_STORE_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          APP_STORE_API_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
        run: |
          mkdir -p $RUNNER_TEMP/ipa_output
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa_output \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_API_KEY_ID}.p8 \
            -authenticationKeyID ${APP_STORE_API_KEY_ID} \
            -authenticationKeyIssuerID ${APP_STORE_API_ISSUER_ID}

          echo "Export contents:"
          ls -la $RUNNER_TEMP/ipa_output/

          mkdir -p build/ios/ipa
          cp $RUNNER_TEMP/ipa_output/*.ipa build/ios/ipa/ 2>/dev/null || true

      # Upload happens automatically during export (destination: upload in ExportOptions.plist)
